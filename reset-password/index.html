<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password – SubTrack</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Fallback if redirect strips query params (use your project URL and anon key) -->

    window.SUBTRACK_SUPABASE_URL = 'https://tudsbylnrsalytztuzgv.supabase.co';
    window.SUBTRACK_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1ZHNieWxucnNhbHl0enR1emd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDkwODksImV4cCI6MjA4ODc4NTA4OX0.OlL31Nm1rHKfRRMbr57017gcyklFArfmoUzgLiWJ8EY';
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 360px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #333; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .success { color: #0a0; margin-top: 16px; }
    .error { color: #c00; margin-top: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Checking link…</div>
  <div id="form" class="hidden">
    <h1>Set new password</h1>
    <p>Enter your new password below. Then open the SubTrack app and sign in.</p>
    <form id="resetForm">
      <input type="password" id="password" placeholder="New password" required minlength="6" autocomplete="new-password">
      <input type="password" id="confirm" placeholder="Confirm new password" required minlength="6" autocomplete="new-password">
      <button type="submit" id="submitBtn">Reset password</button>
    </form>
    <p id="message" class="hidden"></p>
  </div>
  <div id="badLink" class="hidden">
    <h1>Invalid or expired link</h1>
    <p>This reset link is invalid or has expired. Request a new one from the SubTrack app (Forgot password).</p>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var hash = (window.location.hash || '').slice(1);
      var supabaseUrl = params.get('supabase_url') || (window.SUBTRACK_SUPABASE_URL || '');
      var anonKey = params.get('anon_key') || (window.SUBTRACK_ANON_KEY || '');

      if (!supabaseUrl || !anonKey) {
        showBadLink();
        return;
      }

      var supabase = window.supabase.createClient(supabaseUrl, anonKey);

      var hashParams = new URLSearchParams(hash);
      var accessToken = hashParams.get('access_token');
      var refreshToken = hashParams.get('refresh_token');
      var type = hashParams.get('type');

      if (type === 'recovery' && accessToken && refreshToken) {
        supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
          .then(function() {
            showForm();
            if (window.history.replaceState) window.history.replaceState(null, '', window.location.pathname + window.location.search);
          })
          .catch(function() { showBadLink(); });
      } else {
        supabase.auth.getSession().then(function(_ref) {
          var session = _ref.data.session;
          if (session) {
            showForm();
            if (window.history.replaceState) window.history.replaceState(null, '', window.location.pathname + window.location.search);
          } else {
            showBadLink();
          }
        }).catch(function() { showBadLink(); });
      }

      function showForm() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('form').classList.remove('hidden');
      }

      function showBadLink() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('badLink').classList.remove('hidden');
      }

      document.getElementById('resetForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var password = document.getElementById('password').value;
        var confirmVal = document.getElementById('confirm').value;
        var msgEl = document.getElementById('message');
        var btn = document.getElementById('submitBtn');

        if (password !== confirmVal) {
          msgEl.textContent = 'Passwords do not match.';
          msgEl.className = 'error';
          msgEl.classList.remove('hidden');
          return;
        }
        if (password.length < 6) {
          msgEl.textContent = 'Password must be at least 6 characters.';
          msgEl.className = 'error';
          msgEl.classList.remove('hidden');
          return;
        }

        btn.disabled = true;
        msgEl.classList.add('hidden');

        supabase.auth.updateUser({ password: password })
          .then(function() {
            msgEl.textContent = 'Password updated. You can now open the SubTrack app and sign in with your new password.';
            msgEl.className = 'success';
            msgEl.classList.remove('hidden');
            document.getElementById('resetForm').reset();
          })
          .catch(function(err) {
            msgEl.textContent = err.message || 'Something went wrong. Try again or request a new link from the app.';
            msgEl.className = 'error';
            msgEl.classList.remove('hidden');
          })
          .finally(function() { btn.disabled = false; });
      });
    })();
  </script>
</body>
</html>
